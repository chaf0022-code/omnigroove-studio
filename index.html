<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AKAI MPC ONE</title>
    <style>
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #d4c5a0 0%, #c9bfa0 50%, #bfb595 100%);
            box-sizing: border-box;
            overflow: hidden;
        }

        /* HEADER BUTTONS */
        .header {
            padding: 6px;
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            background: rgba(0,0,0,0.1);
        }

        .btn-small {
            padding: 6px 10px;
            font-size: 11px;
            font-weight: bold;
            border: 2px solid #1a1a1a;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 2px 0 #0a0a0a;
            transition: all 0.05s;
            color: #000;
        }

        .btn-small:active {
            transform: translateY(2px);
            box-shadow: 0 0 0;
        }

        .btn-load {
            background: linear-gradient(135deg, #ff8833 0%, #ff6600 100%);
            flex: 1;
        }

        .btn-chop {
            background: linear-gradient(135deg, #ffdd44 0%, #ffcc00 100%);
            flex: 1;
        }

        .btn-export {
            background: linear-gradient(135deg, #44dd44 0%, #22aa22 100%);
            flex: 1;
        }

        /* COLLAPSIBLE SECTIONS */
        .section {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .section.collapsed {
            max-height: 28px;
        }

        .section.expanded {
            max-height: 500px;
        }

        .section-header {
            background: linear-gradient(90deg, #ff6600 0%, #ffaa33 100%);
            color: #000;
            padding: 6px 10px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .section-header:active {
            transform: scale(0.98);
        }

        .toggle-icon {
            font-size: 14px;
            font-weight: bold;
        }

        .section-content {
            padding: 6px;
            overflow-y: auto;
            background: rgba(0,0,0,0.05);
        }

        /* WAVEFORM SECTION */
        .waveform-section {
            flex-shrink: 0;
            margin-bottom: 4px;
        }

        .waveform-container {
            background: #000;
            border: 3px solid #333;
            border-radius: 4px;
            height: 50px;
            cursor: crosshair;
            position: relative;
            margin-bottom: 4px;
        }

        .waveform-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .chop-controls {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
        }

        .btn-chop-control {
            padding: 4px 6px;
            font-size: 9px;
            font-weight: bold;
            border: 1px solid #1a1a1a;
            border-radius: 3px;
            cursor: pointer;
            background: linear-gradient(135deg, #555 0%, #333 100%);
            color: #fff;
            flex: 1;
        }

        .btn-chop-control:active {
            transform: scale(0.95);
        }

        .waveform-info {
            display: flex;
            gap: 4px;
            font-size: 8px;
            color: #0f0;
            text-shadow: 0 0 4px #0f0;
            font-family: 'Courier New', monospace;
        }

        .info-box {
            background: rgba(0,0,0,0.7);
            padding: 3px 6px;
            border-radius: 2px;
            flex: 1;
            text-align: center;
            border: 1px solid #0f0;
        }

        /* PAD GRID */
        .pads-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 6px;
            gap: 4px;
        }

        .pad-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 4px;
            flex: 1;
            overflow: hidden;
        }

        .pad {
            background: linear-gradient(135deg, #6a6a6a 0%, #3a3a3a 100%);
            border: 3px solid #1a1a1a;
            border-radius: 4px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,255,255,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #ccc;
            transition: all 0.05s;
            touch-action: none;
            aspect-ratio: 1;
            min-height: 50px;
        }

        .pad:active {
            transform: translateY(2px);
            background: linear-gradient(135deg, #ff8833 0%, #ff6600 100%);
            color: #fff;
            box-shadow: 0 0 0, 0 0 12px #ff6600;
        }

        .pad.loaded {
            background: linear-gradient(135deg, #5a7a5a 0%, #2a5a2a 100%);
            color: #0f0;
        }

        .pad.loaded:active {
            background: linear-gradient(135deg, #ff8833 0%, #ff6600 100%);
            color: #fff;
        }

        /* BOTTOM CONTROLS */
        .footer {
            display: flex;
            gap: 4px;
            padding: 6px;
            flex-shrink: 0;
            background: rgba(0,0,0,0.1);
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-footer {
            padding: 6px 8px;
            font-size: 9px;
            font-weight: bold;
            border: 2px solid #1a1a1a;
            border-radius: 3px;
            cursor: pointer;
            box-shadow: 0 2px 0 #0a0a0a;
            transition: all 0.05s;
            color: #000;
        }

        .btn-footer:active {
            transform: translateY(2px);
            box-shadow: 0 0 0;
        }

        .btn-play {
            background: linear-gradient(135deg, #44dd44 0%, #22aa22 100%);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ff5544 0%, #dd3322 100%);
            color: #fff;
        }

        .tempo-group {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 9px;
            font-weight: bold;
            color: #000;
        }

        .tempo-group input {
            width: 50px;
            height: 4px;
            cursor: pointer;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <button class="btn-small btn-load" onclick="loadSample()">LOAD</button>
            <button class="btn-small btn-chop" onclick="autoChop16()">AUTO CHOP 16</button>
            <button class="btn-small btn-export" onclick="exportBeat()">EXPORT</button>
            <input type="file" id="audioInput" accept="audio/*">
        </div>

        <!-- WAVEFORM EDITOR -->
        <div class="section waveform-section expanded" id="waveSection">
            <div class="section-header" onclick="toggleSection('waveSection')">
                <span>WAVEFORM EDITOR</span>
                <span class="toggle-icon" id="waveToggle">&lt;</span>
            </div>
            <div class="section-content">
                <div class="waveform-container" id="waveContainer">
                    <canvas id="waveCanvas" class="waveform-canvas"></canvas>
                </div>
                <div class="chop-controls">
                    <button class="btn-chop-control" onclick="setChopStart()">◄ START</button>
                    <button class="btn-chop-control" onclick="setChopEnd()">END ►</button>
                    <button class="btn-chop-control" onclick="assignToPad()">✓ SET</button>
                </div>
                <div class="waveform-info">
                    <span class="info-box" id="sampleInfo">LOAD SAMPLE</span>
                    <span class="info-box" id="sliceInfo">CLICK WAVE</span>
                </div>
            </div>
        </div>

        <!-- PAD GRID -->
        <div class="pads-section">
            <div class="pad-grid" id="padGrid"></div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <button class="btn-footer btn-play" onclick="playSeq()">▶ PLAY</button>
            <button class="btn-footer btn-stop" onclick="stopSeq()">⏹ STOP</button>
            <div class="tempo-group">
                <label>BPM:</label>
                <input type="range" id="tempoSlider" min="60" max="180" value="120" onchange="setTempo(this.value)">
                <span id="tempoValue">120</span>
            </div>
        </div>
    </div>

    <script>
        let audioContext = null;
        let audioBuffer = null;
        let pads = new Array(16).fill(null).map(() => ({
            buffer: null,
            start: 0,
            end: 0,
            pitch: 0
        }));
        let currentPad = 0;
        let chopStart = 0;
        let chopEnd = 0;
        let tempo = 120;
        let isPlaying = false;
        let playingSteps = 0;

        function ensureAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            return audioContext;
        }

        // TOGGLE SECTIONS
        function toggleSection(sectionId) {
            const section = document.getElementById(sectionId);
            const toggle = document.getElementById(sectionId + 'Toggle');
            
            if (section.classList.contains('expanded')) {
                section.classList.remove('expanded');
                section.classList.add('collapsed');
                toggle.textContent = '>';
            } else {
                section.classList.remove('collapsed');
                section.classList.add('expanded');
                toggle.textContent = '<';
            }
        }

        // LOAD SAMPLE
        function loadSample() {
            ensureAudioContext();
            document.getElementById('audioInput').click();
        }

        document.getElementById('audioInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            ensureAudioContext();
            const reader = new FileReader();
            reader.onload = function(evt) {
                audioContext.decodeAudioData(evt.target.result, function(decoded) {
                    audioBuffer = decoded;
                    chopStart = 0;
                    chopEnd = decoded.length;
                    document.getElementById('sampleInfo').textContent = file.name.substring(0, 12);
                    drawWaveform();
                    console.log('Sample loaded:', file.name, decoded.duration);
                }, err => {
                    console.error('Decode error:', err);
                    alert('Could not load audio');
                });
            };
            reader.readAsArrayBuffer(file);
        });

        // DRAW WAVEFORM
        function drawWaveform() {
            const canvas = document.getElementById('waveCanvas');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const w = canvas.offsetWidth;
            const h = canvas.offsetHeight;
            canvas.width = w;
            canvas.height = h;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);

            if (!audioBuffer) return;

            const data = audioBuffer.getChannelData(0);
            const step = Math.ceil(data.length / w);
            const mid = h / 2;

            ctx.fillStyle = '#0f0';
            ctx.lineWidth = 0.5;

            for (let i = 0; i < w; i++) {
                let min = 1, max = -1;
                for (let j = 0; j < step; j++) {
                    const val = data[(i * step + j) % data.length] || 0;
                    min = Math.min(min, val);
                    max = Math.max(max, val);
                }
                ctx.fillRect(i, mid - max * mid, 1, (max - min) * mid);
            }

            // Draw slice area
            if (chopEnd > chopStart && audioBuffer) {
                const x1 = (chopStart / audioBuffer.length) * w;
                const x2 = (chopEnd / audioBuffer.length) * w;
                ctx.fillStyle = 'rgba(255, 102, 0, 0.3)';
                ctx.fillRect(x1, 0, x2 - x1, h);

                ctx.strokeStyle = '#ff6600';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x1, 0);
                ctx.lineTo(x1, h);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x2, 0);
                ctx.lineTo(x2, h);
                ctx.stroke();
            }
        }

        // WAVEFORM CLICK
        document.addEventListener('DOMContentLoaded', function() {
            const waveContainer = document.getElementById('waveContainer');
            if (waveContainer) {
                waveContainer.addEventListener('click', function(e) {
                    if (!audioBuffer) return;
                    const rect = this.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const pct = x / rect.width;
                    const sample = Math.floor(pct * audioBuffer.length);

                    if (chopEnd === audioBuffer.length || chopStart === 0 && chopEnd === audioBuffer.length) {
                        chopStart = sample;
                    } else {
                        chopEnd = Math.max(chopStart + 1000, sample);
                    }

                    if (chopEnd <= chopStart) {
                        chopEnd = chopStart + Math.floor(audioBuffer.length / 16);
                    }

                    drawWaveform();
                    updateSliceInfo();
                });
            }
        });

        function setChopStart() {
            if (!audioBuffer) return;
            chopStart = 0;
            drawWaveform();
        }

        function setChopEnd() {
            if (!audioBuffer) return;
            chopEnd = audioBuffer.length;
            drawWaveform();
        }

        function updateSliceInfo() {
            if (audioBuffer && chopEnd > chopStart) {
                const dur = ((chopEnd - chopStart) / audioBuffer.sampleRate).toFixed(2);
                document.getElementById('sliceInfo').textContent = `${dur}s`;
            }
        }

        function assignToPad() {
            if (!audioBuffer || chopEnd <= chopStart) {
                alert('Select slice first');
                return;
            }

            pads[currentPad].buffer = audioBuffer;
            pads[currentPad].start = chopStart;
            pads[currentPad].end = chopEnd;

            const padEl = document.querySelectorAll('.pad')[currentPad];
            padEl.classList.add('loaded');
            padEl.textContent = `P${currentPad + 1}`;

            console.log('Pad', currentPad, 'loaded with slice');
        }

        // AUTO CHOP
        function autoChop16() {
            if (!audioBuffer) {
                alert('Load sample first');
                return;
            }

            const sliceLen = audioBuffer.length / 16;
            for (let i = 0; i < 16; i++) {
                pads[i].buffer = audioBuffer;
                pads[i].start = Math.floor(i * sliceLen);
                pads[i].end = Math.floor((i + 1) * sliceLen);
            }

            document.querySelectorAll('.pad').forEach((el, i) => {
                el.classList.add('loaded');
                el.textContent = `P${i + 1}`;
            });

            console.log('Auto-chopped into 16 slices');
        }

        // PLAY PAD
        function playPad(padIdx) {
            ensureAudioContext();
            const pad = pads[padIdx];
            if (!pad.buffer || pad.end <= pad.start) return;

            const start = pad.start / pad.buffer.sampleRate;
            const dur = (pad.end - pad.start) / pad.buffer.sampleRate;

            try {
                const src = audioContext.createBufferSource();
                src.buffer = pad.buffer;
                src.playbackRate.value = Math.pow(2, pad.pitch / 12);
                src.connect(audioContext.destination);
                src.start(0, start, dur);
                console.log('Playing pad', padIdx);
            } catch (err) {
                console.error('Play error:', err);
            }
        }

        // SEQUENCER
        function playSeq() {
            ensureAudioContext();
            isPlaying = true;
            playingSteps = 0;
            runSeq();
        }

        function runSeq() {
            if (!isPlaying) return;

            // Play any pad (or loop loaded pad)
            if (pads[0].buffer) {
                playPad(playingSteps % 16);
            }

            playingSteps = (playingSteps + 1) % 16;
            const stepMs = (60000 / tempo) / 4;
            setTimeout(runSeq, stepMs);
        }

        function stopSeq() {
            isPlaying = false;
        }

        function setTempo(val) {
            tempo = parseInt(val);
            document.getElementById('tempoValue').textContent = val;
        }

        // EXPORT
        function exportBeat() {
            if (!audioBuffer) {
                alert('Load sample first');
                return;
            }

            const ctx = new OfflineAudioContext(audioBuffer.numberOfChannels, audioBuffer.length, audioBuffer.sampleRate);
            const src = ctx.createBufferSource();
            src.buffer = audioBuffer;
            src.connect(ctx.destination);
            src.start(0);

            ctx.startRendering().then(buf => {
                const wav = toWAV(buf);
                const blob = new Blob([wav], {type: 'audio/wav'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'beat.wav';
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        function toWAV(buf) {
            const ch = buf.numberOfChannels;
            const sr = buf.sampleRate;
            const len = buf.length * ch * 2;

            const view = new DataView(new ArrayBuffer(44 + len));
            const write = (off, str) => {
                for (let i = 0; i < str.length; i++) {
                    view.setUint8(off + i, str.charCodeAt(i));
                }
            };

            write(0, 'RIFF');
            view.setUint32(4, 36 + len, true);
            write(8, 'WAVE');
            write(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, ch, true);
            view.setUint32(24, sr, true);
            view.setUint32(28, sr * ch * 2, true);
            view.setUint16(32, ch * 2, true);
            view.setUint16(34, 16, true);
            write(36, 'data');
            view.setUint32(40, len, true);

            let off = 44;
            for (let i = 0; i < buf.length; i++) {
                for (let c = 0; c < ch; c++) {
                    const s = Math.max(-1, Math.min(1, buf.getChannelData(c)[i]));
                    view.setInt16(off, s * 0x7fff, true);
                    off += 2;
                }
            }

            return view.buffer;
        }

        // INIT
        window.addEventListener('load', function() {
            ensureAudioContext();
            drawWaveform();

            // Create pad buttons
            const grid = document.getElementById('padGrid');
            for (let i = 0; i < 16; i++) {
                const pad = document.createElement('button');
                pad.className = 'pad';
                pad.textContent = `P${i + 1}`;
                pad.addEventListener('touchstart', e => { e.preventDefault(); playPad(i); currentPad = i; }, {passive: false});
                pad.addEventListener('mousedown', () => { playPad(i); currentPad = i; });
                grid.appendChild(pad);
            }

            console.log('MPC ONE ready');
        });
    </script>
</body>
</html>
