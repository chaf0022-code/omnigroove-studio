<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniGroove Studio Hardware Core</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        /* Akai MPC One Hardware Colors & Texture */
        .mpc-one-chassis {
            background: linear-gradient(145deg, #2b2e33 0%, #17191c 100%);
            border: 4px solid #111215;
            box-shadow: inset 0 2px 3px rgba(255,255,255,0.05), 0 15px 35px rgba(0,0,0,0.9);
        }
        /* Thick Akai Square 16-Pad Matrix Styling */
        .mpc-square-pad {
            background: linear-gradient(180deg, #374151 0%, #1f2937 100%);
            border: 1px solid #111827;
            box-shadow: 0 5px 0 #0b0f17, inset 0 2px 2px rgba(255,255,255,0.15);
            transition: all 0.04s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .mpc-square-pad:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #000, 0 0 20px #f97316;
            background: #f97316 !important;
        }
        /* Roland SP-404MKII Dark Charcoal Faceplate Styling */
        .sp-faceplate {
            background: #1a1a1a;
            border: 4px solid #0d0d0d;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.05);
        }
        .sp-circular-display {
            background: radial-gradient(circle, #ff5500 0%, #110400 90%);
            border: 6px solid #2d2d2d;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.9);
        }
        /* Swipe mandatory horizontal slider mechanics */
        .hardware-deck-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .hardware-deck-slider::-webkit-scrollbar { display: none; }
        .hardware-page { flex: 0 0 100%; width: 100%; scroll-snap-align: start; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans h-screen overflow-hidden select-none">

    <!-- HORIZONTAL DEVICE CAROUSEL SLIDER -->
    <div class="hardware-deck-slider w-full h-full">

        <!-- PAGE 1: REPLICA AKAI MPC ONE HARDWARE INTERFACE -->
        <div class="hardware-page h-full p-3 flex flex-col justify-between mpc-one-chassis relative">
            
            <!-- MPC Built-in LCD Touchscreen Panel -->
            <div class="w-full h-2/5 bg-zinc-900 border-2 border-zinc-950 rounded-lg p-2 flex flex-col justify-between shadow-inner">
                <div class="flex justify-between items-center text-[10px] text-zinc-500 font-bold border-b border-zinc-800 pb-1">
                    <span class="text-orange-500 font-black tracking-widest">MPC ONE STANDALONE DECK</span>
                    <span>Swipe Right ➡️ for SP-404 FX</span>
                </div>
                
                <!-- PLAYLIST ENGINE LAYER (Starts completely empty) -->
                <div class="flex-1 overflow-y-auto my-1 py-1 px-1 bg-black/60 rounded border border-zinc-950 flex flex-col gap-1 justify-center items-center" id="playlistWindow">
                    <div id="emptyPlaylistMsg" class="text-center text-[11px] text-zinc-500 font-black uppercase tracking-wider animate-pulse">
                        📭 Empty Playlist - Load a Record below to Begin
                    </div>
                </div>

                <!-- Bottom screen options -->
                <div class="flex justify-between items-center pt-1 border-t border-zinc-800">
                    <label class="bg-zinc-800 text-zinc-300 px-3 py-1 rounded text-[10px] font-black border border-zinc-700 cursor-pointer shadow">
                        LOAD SAMPLE
                        <input type="file" id="audioFile" accept="audio/*" class="hidden" onchange="handleAudioUpload(event)">
                    </label>
                    <button onclick="autoChop()" class="bg-orange-600 px-4 py-1 rounded text-[10px] font-black text-white shadow uppercase tracking-wider">Chop 16</button>
                </div>
            </div>

            <!-- Authentic 4x4 Grid Matrix Arrangement Box -->
            <div class="h-3/5 w-full mt-2 bg-zinc-950/40 p-2 rounded-xl border border-zinc-900 flex flex-col justify-between shadow-inner">
                <div class="grid grid-cols-4 grid-rows-4 gap-2.5 h-full p-0.5">
                    <script>
                        for(let i = 16; i >= 1; i--) {
                            document.write(`<button onmousedown="triggerPad(${i-1})" class="mpc-square-pad rounded-md flex items-end p-1.5 text-[10px] font-black text-zinc-500 tracking-wider">PAD ${i}</button>`);
                        }
                    </script>
                </div>
            </div>
        </div>

        <!-- PAGE 2: REPLICA ROLAND SP-404MKII + HANDYTRAX DECK WORKSPACE -->
        <div class="hardware-page h-full p-3 flex flex-col justify-between sp-faceplate border-l-4 border-black">
            
            <!-- Top Section: Handytrax Horizontal Deck layout inside the SP Casing -->
            <div class="w-full bg-black rounded-lg border-2 border-zinc-900 p-2 flex flex-col gap-1.5">
                <div class="flex justify-between items-center text-[9px] font-black text-zinc-500 uppercase tracking-widest">
                    <span>⬅️ Swipe Left for MPC One</span>
                    <span class="text-orange-500">HandyTrax Scratch Ribbon</span>
                </div>
                <!-- Real-time turntable scratch target waveform ribbon -->
                <canvas id="waveformCanvas" class="w-full h-16 bg-zinc-950 rounded cursor-ew-resize border border-zinc-900"></canvas>
            </div>

            <!-- SP-404MKII Iconic Center Circular screen -->
            <div class="w-full flex justify-center my-1.5">
                <div class="w-24 h-24 rounded-full sp-circular-display flex items-center justify-center flex-col text-center">
                    <span class="text-orange-500 font-mono text-xl font-bold tracking-tighter" id="spDisplayVal">FX</span>
                    <span class="text-[8px] text-orange-600 font-bold uppercase tracking-widest">BUS MFX</span>
                </div>
            </div>

            <!-- Industrial FX Launch Button Grid Row Component -->
            <div class="flex-1 w-full bg-zinc-950/60 rounded-xl border border-zinc-900 p-3 flex flex-col justify-around gap-2 shadow-2xl">
                <button id="vinylSimBtn" onclick="toggleVinylSim()" class="w-full bg-zinc-800 py-3 rounded-lg border border-zinc-700 text-[11px] font-black tracking-widest text-zinc-400 shadow">
                    VINYL SIMULATOR
                </button>
                <button id="compBtn" onclick="toggleCompressor()" class="w-full bg-zinc-800 py-3 rounded-lg border border-zinc-700 text-[11px] font-black tracking-widest text-zinc-400 shadow">
                    303 COMP PUMP
                </button>
                <button id="cassetteBtn" onclick="toggleCassette()" class="w-full bg-zinc-800 py-3 rounded-lg border border-zinc-700 text-[11px] font-black tracking-widest text-zinc-400 shadow">
                    CASSETTE DRIVE
                </button>
            </div>
        </div>

    </div>

    <!-- AUDIO ENGINE IMPLEMENTATION FRAME -->
    <script>
        let audioCtx = null, masterAudioBuffer = null, padBuffers = new Array(16).fill(null);
        let mainVolume = null, compressorNode = null, crackleNode = null, cassetteFilter = null;
        let isCompActive = false, isVinylSimActive = false, isCassetteActive = false;

        // Turntable scratch engine track coordinates
        let canvas = document.getElementById('waveformCanvas'), ctx = canvas.getContext('2d');
        let isScratching = false, scratchLastX = 0, currentPlaybackTime = 0, scratchSource = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                mainVolume = audioCtx.createGain(); mainVolume.gain.value = 1.0;
                
                compressorNode = audioCtx.createDynamicsCompressor();
                compressorNode.threshold.setValueAtTime(-38, audioCtx.currentTime);
                compressorNode.ratio.setValueAtTime(14, audioCtx.currentTime);
                compressorNode.attack.setValueAtTime(0.002, audioCtx.currentTime);
                compressorNode.release.setValueAtTime(0.09, audioCtx.currentTime);

                cassetteFilter = audioCtx.createBiquadFilter();
                cassetteFilter.type = 'lowpass'; cassetteFilter.frequency.value = 6500;
                mainVolume.connect(audioCtx.destination);
            }
        }

        function handleAudioUpload(event) {
            initAudio();
            let file = event.target.files; if (!file) return;
            
            document.getElementById('emptyPlaylistMsg').remove();
            let playlist = document.getElementById('playlistWindow');
            playlist.className = "flex-1 overflow-y-auto my-1 py-1 px-1 bg-black/60 rounded border border-zinc-950 flex flex-col gap-1 justify-start items-stretch w-full text-left";
            
            let item = document.createElement('div');
            item.className = "bg-zinc-900 border border-zinc-800 rounded p-1.5 text-[10px] text-orange-400 font-mono flex justify-between";
            item.innerHTML = `<span>📼 ${file.name.substring(0,25)}</span><span class="text-zinc-600 font-bold text-[8px]">LOADED</span>`;
            playlist.appendChild(item);

            let reader = new FileReader();
            reader.onload = function(e) {
                audioCtx.decodeAudioData(e.target.result, function(buffer) {
                    masterAudioBuffer = buffer;
                    drawWaveform(buffer);
                });
            }; reader.readAsArrayBuffer(file);
        }
