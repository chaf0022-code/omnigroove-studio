<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AKAI MPC ONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .mpc-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #d4c5a0 0%, #c9bfa0 50%, #bfb595 100%);
            border: 8px solid #1a1a1a;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* COLLAPSIBLE PANELS */
        .panel {
            background: rgba(0,0,0,0.1);
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .panel-header {
            background: linear-gradient(90deg, #ff6600 0%, #ffaa33 100%);
            color: #000;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .panel-header:active {
            transform: scale(0.98);
        }

        .panel-content {
            max-height: 500px;
            overflow-y: auto;
            transition: max-height 0.3s ease;
        }

        .panel.collapsed .panel-content {
            max-height: 0;
        }

        /* TOP LCD */
        .lcd-section {
            flex-shrink: 0;
            padding: 8px;
        }

        .lcd-panel {
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%);
            border: 4px solid #2a2a2a;
            border-radius: 6px;
            padding: 8px;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.9);
        }

        .waveform-editor {
            background: #000;
            border: 2px solid #333;
            border-radius: 4px;
            height: 60px;
            cursor: crosshair;
            margin-bottom: 6px;
            position: relative;
        }

        .waveform-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .slice-info {
            display: flex;
            gap: 6px;
            font-family: 'Courier New', monospace;
            font-size: 9px;
            color: #0f0;
            text-shadow: 0 0 4px #0f0;
            flex-wrap: wrap;
        }

        .info-item {
            background: rgba(0,0,0,0.5);
            padding: 3px 6px;
            border-radius: 2px;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }

        /* CONTROLS */
        .btn {
            padding: 6px 10px;
            border: 2px solid #1a1a1a;
            border-radius: 4px;
            font-size: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 0 #0a0a0a;
            transition: all 0.05s;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0;
        }

        .btn.primary { background: linear-gradient(135deg, #ff8833 0%, #ff6600 100%); color: #000; }
        .btn.secondary { background: linear-gradient(135deg, #ffdd44 0%, #ffcc00 100%); color: #000; }
        .btn.success { background: linear-gradient(135deg, #44dd44 0%, #22aa22 100%); color: #000; }
        .btn.danger { background: linear-gradient(135deg, #ff5544 0%, #dd3322 100%); color: #fff; }

        /* MAIN */
        .main-section {
            flex: 1;
            display: flex;
            gap: 8px;
            padding: 8px;
            overflow: hidden;
        }

        /* LEFT PANEL */
        .left-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
            width: 70px;
        }

        .small-btn {
            padding: 4px;
            font-size: 7px;
            flex: 1;
            min-height: 24px;
        }

        /* CENTER - PADS */
        .center-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
        }

        .pad-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .mpc-pad {
            background: linear-gradient(135deg, #6a6a6a 0%, #3a3a3a 100%);
            border: 4px solid #1a1a1a;
            border-radius: 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,255,255,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: #ddd;
            transition: all 0.05s;
            touch-action: none;
            aspect-ratio: 1;
        }

        .mpc-pad:active {
            transform: translateY(4px);
            background: linear-gradient(135deg, #ff8833 0%, #ff6600 100%);
            color: #fff;
            box-shadow: 0 0 0, 0 0 20px #ff6600;
        }

        /* SEQUENCER */
        .seq-row {
            display: flex;
            gap: 3px;
            flex-shrink: 0;
        }

        .seq-step {
            flex: 1;
            height: 20px;
            background: linear-gradient(135deg, #333 0%, #111 100%);
            border: 1px solid #1a1a1a;
            border-radius: 2px;
            cursor: pointer;
            font-size: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-weight: bold;
            transition: all 0.1s;
        }

        .seq-step.active {
            background: linear-gradient(135deg, #ff8833 0%, #ff6600 100%);
            color: #fff;
            box-shadow: 0 0 12px #ff6600;
        }

        /* RIGHT PANEL */
        .right-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
            width: 70px;
        }

        .effect-ctrl {
            background: rgba(0,0,0,0.2);
            padding: 6px;
            border-radius: 4px;
            font-size: 7px;
        }

        .effect-label {
            text-align: center;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .effect-slider {
            width: 100%;
            height: 4px;
            cursor: pointer;
        }

        /* BOTTOM */
        .bottom-strip {
            flex-shrink: 0;
            padding: 8px;
            background: rgba(0,0,0,0.1);
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
            border-top: 2px solid rgba(0,0,0,0.2);
            overflow-y: auto;
            max-height: 60px;
        }

        input[type="file"] { display: none; }
        input[type="range"] { cursor: pointer; }

        .tempo-display {
            background: rgba(0,0,0,0.3);
            padding: 3px 6px;
            border-radius: 2px;
            font-size: 8px;
            font-weight: bold;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="mpc-container">
        <!-- LCD -->
        <div class="lcd-section">
            <div class="panel">
                <div class="panel-header" onclick="togglePanel(this)">
                    LCD SCREEN <span>▼</span>
                </div>
                <div class="panel-content">
                    <div class="lcd-panel">
                        <div style="background: linear-gradient(90deg, #ff6600 0%, #ffaa33 100%); color: #000; padding: 6px; font-size: 11px; font-weight: bold; letter-spacing: 1px; text-align: center; border-radius: 3px; margin-bottom: 6px;">AKAI MPC ONE</div>
                        <div class="waveform-editor" id="waveformEditor">
                            <canvas id="waveformCanvas" class="waveform-canvas"></canvas>
                        </div>
                        <div class="slice-info">
                            <span class="info-item" id="sampleInfo">LOAD SAMPLE</span>
                            <span class="info-item" id="sliceInfo">CLICK WAVE</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN -->
        <div class="main-section">
            <!-- LEFT -->
            <div class="left-section">
                <button class="btn primary small-btn" onclick="triggerLoadSample()">LOAD</button>
                <button class="btn secondary small-btn" onclick="setSliceStart()">START</button>
                <button class="btn secondary small-btn" onclick="setSliceEnd()">END</button>
                <button class="btn success small-btn" onclick="assignSlice()">SET</button>
                <button class="btn danger small-btn" onclick="clearSlice()">CLR</button>
            </div>

            <!-- CENTER -->
            <div class="center-section">
                <div class="seq-row" id="sequencerRow"></div>
                <div class="pad-grid" id="padGrid"></div>
            </div>

            <!-- RIGHT -->
            <div class="right-section">
                <div class="panel">
                    <div class="panel-header" onclick="togglePanel(this)" style="background: linear-gradient(90deg, #44dd44 0%, #22aa22 100%); padding: 6px;">
                        FX <span>▼</span>
                    </div>
                    <div class="panel-content">
                        <div class="effect-ctrl">
                            <div class="effect-label">REVERB</div>
                            <input type="range" class="effect-slider" min="0" max="100" value="0">
                        </div>
                        <div class="effect-ctrl">
                            <div class="effect-label">FILTER</div>
                            <input type="range" class="effect-slider" min="20" max="20000" value="20000">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTTOM -->
        <div class="bottom-strip">
            <button class="btn success" onclick="playSequence()" style="margin-right: auto;">▶ PLAY</button>
            <button class="btn danger" onclick="stopSequence()">⏹ STOP</button>
            
            <label style="font-size: 8px; font-weight: bold; color: #000;">BPM:</label>
            <input type="range" id="tempoSlider" min="60" max="180" value="120" onchange="setTempo(this.value)" style="width: 50px; height: 4px;">
            <span class="tempo-display" id="tempoDisplay">120</span>

            <label style="font-size: 8px; font-weight: bold; color: #000; margin-left: 10px;">PITCH:</label>
            <input type="range" id="pitchSlider" min="-12" max="12" value="0" onchange="setPitch(this.value)" style="width: 50px; height: 4px;">
            <span class="tempo-display" id="pitchDisplay">0</span>

            <button class="btn primary" onclick="exportBeat()" style="margin-left: auto;">EXPORT</button>

            <input type="file" id="audioInput" accept="audio/*">
        </div>
    </div>

    <script>
        let audioContext = null;
        let audioBuffer = null;
        let pads = new Array(16).fill(null).map(() => ({ start: 0, end: 0, pitch: 0 }));
        let currentPadIndex = 0;
        let sliceStart = 0;
        let sliceEnd = 0;
        let tempo = 120;
        let isPlaying = false;
        let sequence = new Array(16).fill(-1);

        function ensureAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume().then(() => console.log('AudioContext resumed')).catch(err => console.log('Resume blocked:', err));
            }
            return audioContext;
        }

        function togglePanel(header) {
            header.parentElement.classList.toggle('collapsed');
            header.querySelector('span').textContent = header.parentElement.classList.contains('collapsed') ? '▶' : '▼';
        }

        // WAVEFORM
        function drawWaveform() {
            const canvas = document.getElementById('waveformCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!audioBuffer) return;

            const data = audioBuffer.getChannelData(0);
            const step = Math.ceil(data.length / canvas.width);
            const amp = canvas.height / 2;

            ctx.fillStyle = '#0f0';
            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 1;

            for (let i = 0; i < canvas.width; i++) {
                let min = 1, max = -1;
                for (let j = 0; j < step; j++) {
                    const s = data[i * step + j] || 0;
                    if (s < min) min = s;
                    if (s > max) max = s;
                }
                ctx.fillRect(i, amp - max * amp, 1, (max - min) * amp);
            }

            // Draw slice
            if (sliceEnd > sliceStart && audioBuffer) {
                const x1 = (sliceStart / audioBuffer.length) * canvas.width;
                const x2 = (sliceEnd / audioBuffer.length) * canvas.width;
                ctx.fillStyle = 'rgba(255, 102, 0, 0.3)';
                ctx.fillRect(x1, 0, x2 - x1, canvas.height);
            }
        }

        // LOADING
        function triggerLoadSample() {
            ensureAudioContext();
            document.getElementById('audioInput').click();
        }

        document.getElementById('audioInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            ensureAudioContext();
            const reader = new FileReader();
            reader.onload = function(evt) {
                audioContext.decodeAudioData(evt.target.result, function(decoded) {
                    audioBuffer = decoded;
                    sliceStart = 0;
                    sliceEnd = decoded.length;
                    document.getElementById('sampleInfo').textContent = file.name.substring(0, 16);
                    drawWaveform();
                    console.log('Sample loaded:', file.name, decoded.duration);
                }, err => console.error('Decode error:', err));
            };
            reader.readAsArrayBuffer(file);
        });

        // SLICING
        document.getElementById('waveformEditor').addEventListener('click', function(e) {
            if (!audioBuffer) return;
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const pct = x / rect.width;
            const sample = Math.floor(pct * audioBuffer.length);
            
            if (sliceStart === 0 && sliceEnd === audioBuffer.length) {
                sliceStart = sample;
            } else if (sliceStart > 0) {
                sliceEnd = Math.max(sliceStart + 1000, sample);
            }
            
            drawWaveform();
            const dur = ((sliceEnd - sliceStart) / audioBuffer.sampleRate).toFixed(2);
            document.getElementById('sliceInfo').textContent = `${dur}s`;
        });

        function setSliceStart() {
            if (!audioBuffer) return;
            sliceStart = 0;
            sliceEnd = audioBuffer.length / 2;
            drawWaveform();
        }

        function setSliceEnd() {
            if (!audioBuffer) return;
            sliceStart = audioBuffer.length / 2;
            sliceEnd = audioBuffer.length;
            drawWaveform();
        }

        function assignSlice() {
            if (!audioBuffer || sliceEnd <= sliceStart) {
                alert('Set slice first');
                return;
            }
            pads[currentPadIndex].start = sliceStart;
            pads[currentPadIndex].end = sliceEnd;
            console.log('Assigned pad', currentPadIndex, 'start:', sliceStart, 'end:', sliceEnd);
        }

        function clearSlice() {
            sliceStart = 0;
            sliceEnd = audioBuffer ? audioBuffer.length : 0;
            drawWaveform();
        }

        // PLAYBACK
        function playSlice(padIndex) {
            ensureAudioContext();
            if (!audioBuffer) return;

            const pad = pads[padIndex];
            if (pad.end <= pad.start) return;

            const start = pad.start / audioBuffer.sampleRate;
            const duration = (pad.end - pad.start) / audioBuffer.sampleRate;

            try {
                const src = audioContext.createBufferSource();
                src.buffer = audioBuffer;
                src.playbackRate.value = Math.pow(2, pad.pitch / 12);
                src.connect(audioContext.destination);
                src.start(0, start, duration);
                console.log('Playing pad', padIndex, 'pitch:', pad.pitch);
            } catch(err) {
                console.error('Play error:', err);
            }
        }

        function hitPad(idx) {
            ensureAudioContext();
            playSlice(idx);
            const pad = document.querySelectorAll('.mpc-pad')[idx];
            if (pad) {
                pad.style.transform = 'translateY(4px)';
                setTimeout(() => pad.style.transform = '', 80);
            }
        }

        // SEQUENCER
        function playSequence() {
            isPlaying = true;
            let step = 0;
            const stepMs = (60000 / tempo) / 4;

            function nextStep() {
                if (!isPlaying) return;
                if (sequence[step] >= 0) {
                    playSlice(sequence[step]);
                }
                document.querySelectorAll('.seq-step').forEach((e, i) => {
                    e.classList.toggle('active', i === step);
                });
                step = (step + 1) % 16;
                setTimeout(nextStep, stepMs);
            }

            nextStep();
        }

        function stopSequence() {
            isPlaying = false;
            document.querySelectorAll('.seq-step').forEach(e => e.classList.remove('active'));
        }

        function setTempo(val) {
            tempo = parseInt(val);
            document.getElementById('tempoDisplay').textContent = val;
        }

        function setPitch(val) {
            pads[currentPadIndex].pitch = parseInt(val);
            document.getElementById('pitchDisplay').textContent = val;
        }

        // EXPORT
        function exportBeat() {
            if (!audioBuffer) {
                alert('Load sample first');
                return;
            }

            const ctx = new OfflineAudioContext(audioBuffer.numberOfChannels, audioBuffer.length, audioBuffer.sampleRate);
            const src = ctx.createBufferSource();
            src.buffer = audioBuffer;
            src.connect(ctx.destination);
            src.start(0);

            ctx.startRendering().then(buf => {
                const wav = audioBufferToWav(buf);
                const blob = new Blob([wav], {type: 'audio/wav'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'beat.wav';
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        function audioBufferToWav(buf) {
            const ch = buf.numberOfChannels;
            const sr = buf.sampleRate;
            const len = buf.length * ch * 2;

            const view = new DataView(new ArrayBuffer(44 + len));
            const write = (off, str) => {
                for (let i = 0; i < str.length; i++) {
                    view.setUint8(off + i, str.charCodeAt(i));
                }
            };

            write(0, 'RIFF');
            view.setUint32(4, 36 + len, true);
            write(8, 'WAVE');
            write(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, ch, true);
            view.setUint32(24, sr, true);
            view.setUint32(28, sr * ch * 2, true);
            view.setUint16(32, ch * 2, true);
            view.setUint16(34, 16, true);
            write(36, 'data');
            view.setUint32(40, len, true);

            let off = 44;
            for (let i = 0; i < buf.length; i++) {
                for (let c = 0; c < ch; c++) {
                    const s = Math.max(-1, Math.min(1, buf.getChannelData(c)[i]));
                    view.setInt16(off, s * 0x7fff, true);
                    off += 2;
                }
            }

            return view.buffer;
        }

        // INIT
        function init() {
            ensureAudioContext();

            // Pads
            const grid = document.getElementById('padGrid');
            for (let i = 0; i < 16; i++) {
                const p = document.createElement('button');
                p.className = 'mpc-pad';
                p.textContent = `P${i + 1}`;
                p.addEventListener('touchstart', e => { e.preventDefault(); hitPad(i); }, {passive: false});
                p.addEventListener('mousedown', () => hitPad(i));
                p.addEventListener('click', () => {
                    currentPadIndex = i;
                    console.log('Selected pad:', i);
                });
                grid.appendChild(p);
            }

            // Sequencer
            const seq = document.getElementById('sequencerRow');
            for (let i = 0; i < 16; i++) {
                const s = document.createElement('button');
                s.className = 'seq-step';
                s.textContent = i + 1;
                s.addEventListener('click', () => {
                    sequence[i] = sequence[i] >= 0 ? -1 : currentPadIndex;
                    s.classList.toggle('active', sequence[i] >= 0);
                });
                seq.appendChild(s);
            }

            console.log('MPC ONE initialized');
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
