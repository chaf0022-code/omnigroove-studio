<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AKAI MPC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        html, body { width: 100%; height: 100%; font-family: Arial; background: #000; }
        body { display: flex; }
        
        .container {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: 35px 70px 30px 1fr;
            gap: 5px;
            padding: 5px;
            background: #b3a090;
        }
        
        .header {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }
        
        .btn {
            border: 2px solid #333;
            border-radius: 4px;
            font-weight: bold;
            font-size: 9px;
            cursor: pointer;
            color: #000;
            box-shadow: 0 2px 4px #000;
        }
        
        .btn:active { transform: translateY(1px); }
        .btn-yellow { background: #ffdd00; }
        .btn-orange { background: #ff8800; }
        .btn-green { background: #22dd22; }
        .btn-red { background: #ff4444; color: #fff; }
        
        .lcd {
            background: #000;
            border: 3px solid #333;
            border-radius: 4px;
            display: flex;
            gap: 3px;
            padding: 3px;
            overflow: hidden;
        }
        
        #waveCanvas {
            flex: 1;
            background: #0a2a3a;
            border-radius: 2px;
        }
        
        .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            color: #0f0;
            font-size: 7px;
            min-width: 35px;
        }
        
        .info-box {
            background: rgba(0,0,0,0.7);
            border: 1px solid #0f0;
            padding: 2px;
            border-radius: 2px;
            text-align: center;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }
        
        .controls button {
            background: #555;
            color: #fff;
            border: 1px solid #222;
            border-radius: 3px;
            font-size: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .pads-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 4px;
            width: 100%;
            height: 100%;
        }
        
        .pad {
            background: linear-gradient(135deg, #666, #333);
            border: 2px solid #111;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: #999;
            box-shadow: 0 3px 6px #000, inset 0 1px 2px rgba(255,255,255,0.1);
            transition: 0.05s;
        }
        
        .pad:active, .pad.active {
            background: linear-gradient(135deg, #ff8833, #ff6600);
            color: #fff;
            box-shadow: 0 0 10px #ff8800, inset 0 1px 2px rgba(255,255,255,0.3);
            transform: scale(0.95);
        }
        
        .pad.loaded {
            background: linear-gradient(135deg, #4a7a4a, #2a5a2a);
            color: #00ff00;
            border-color: #00cc00;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="btn btn-yellow" onclick="loadAudio()">LOAD</button>
            <button class="btn btn-orange" onclick="autoChop()">AUTO 16</button>
            <button class="btn btn-green" onclick="playAll()">▶ PLAY</button>
            <button class="btn btn-red" onclick="exportWAV()">EXPORT</button>
        </div>
        
        <div class="lcd">
            <canvas id="waveCanvas"></canvas>
            <div class="info">
                <div class="info-box" id="fname">-</div>
                <div class="info-box" id="flen">0s</div>
                <div class="info-box" id="fslices">0</div>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="setStart()">◄ START</button>
            <button onclick="setEnd()">END ►</button>
            <button onclick="assignPad()">ASSIGN</button>
            <button onclick="stopAll()">⏹ STOP</button>
        </div>
        
        <div class="pads-container" id="pads"></div>
    </div>
    
    <input type="file" id="file" accept="audio/*" style="display:none">
    
    <script>
        let ctx = null, buf = null, padData = Array(16).fill(0).map(() => ({b:null,s:0,e:0}));
        let chS = 0, chE = 0, curP = 0, play = false;
        
        function ensureCtx() {
            if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (ctx.state === 'suspended') ctx.resume();
            return ctx;
        }
        
        function loadAudio() {
            ensureCtx();
            document.getElementById('file').click();
        }
        
        document.getElementById('file').onchange = function(e) {
            const f = e.target.files[0];
            if (!f) return;
            const r = new FileReader();
            r.onload = function(evt) {
                ensureCtx();
                ctx.decodeAudioData(evt.target.result, d => {
                    buf = d;
                    chS = 0; chE = d.length;
                    document.getElementById('fname').textContent = f.name.slice(0,8);
                    document.getElementById('flen').textContent = d.duration.toFixed(1) + 's';
                    draw();
                }, e => alert('Audio error'));
            };
            r.readAsArrayBuffer(f);
        };
        
        function draw() {
            const c = document.getElementById('waveCanvas');
            if (!c || !buf) return;
            const g = c.getContext('2d');
            const w = c.width = c.offsetWidth;
            const h = c.height = c.offsetHeight;
            
            g.fillStyle = '#0a2a3a';
            g.fillRect(0, 0, w, h);
            
            const d = buf.getChannelData(0);
            const st = Math.ceil(d.length / w);
            const m = h / 2;
            
            g.strokeStyle = '#0f0';
            g.lineWidth = 1;
            g.beginPath();
            
            for (let i = 0; i < w; i++) {
                let mn = 1, mx = -1;
                for (let j = 0; j < st; j++) {
                    const v = d[i * st + j] || 0;
                    mn = Math.min(mn, v);
                    mx = Math.max(mx, v);
                }
                const y = m - mx * m;
                i === 0 ? g.moveTo(i, y) : g.lineTo(i, y);
            }
            g.stroke();
            
            if (chE > chS) {
                const x1 = (chS / buf.length) * w;
                const x2 = (chE / buf.length) * w;
                g.fillStyle = 'rgba(255,136,0,0.2)';
                g.fillRect(x1, 0, x2-x1, h);
                g.strokeStyle = '#ff8800';
                g.lineWidth = 2;
                g.beginPath();
                g.moveTo(x1, 0); g.lineTo(x1, h);
                g.stroke();
                g.beginPath();
                g.moveTo(x2, 0); g.lineTo(x2, h);
                g.stroke();
            }
        }
        
        document.getElementById('waveCanvas').onclick = function(e) {
            if (!buf) return;
            const r = this.getBoundingClientRect();
            const x = e.clientX - r.left;
            const s = Math.floor((x / r.width) * buf.length);
            if (chE === buf.length || (chS === 0 && chE === buf.length)) {
                chS = s;
            } else {
                chE = s;
                if (chE < chS) [chS, chE] = [chE, chS];
            }
            draw();
        };
        
        function setStart() {
            if (!buf) return;
            chS = 0;
            draw();
        }
        
        function setEnd() {
            if (!buf) return;
            chE = buf.length;
            draw();
        }
        
        function autoChop() {
            if (!buf) return alert('Load audio first');
            const len = buf.length / 16;
            for (let i = 0; i < 16; i++) {
                padData[i] = {b: buf, s: Math.floor(i * len), e: Math.floor((i+1) * len)};
            }
            document.querySelectorAll('.pad').forEach(p => p.classList.add('loaded'));
            document.getElementById('fslices').textContent = '16';
        }
        
        function assignPad() {
            if (!buf || chE <= chS) return alert('Select slice');
            padData[curP] = {b: buf, s: chS, e: chE};
            document.querySelectorAll('.pad')[curP].classList.add('loaded');
            const cnt = padData.filter(p => p.b).length;
            document.getElementById('fslices').textContent = cnt;
        }
        
        function playPad(i) {
            ensureCtx();
            const p = padData[i];
            if (!p.b || p.e <= p.s) return;
            const src = ctx.createBufferSource();
            src.buffer = p.b;
            src.connect(ctx.destination);
            const st = p.s / p.b.sampleRate;
            const d = (p.e - p.s) / p.b.sampleRate;
            src.start(0, st, d);
            
            const el = document.querySelectorAll('.pad')[i];
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 100);
        }
        
        function playAll() {
            ensureCtx();
            if (play) return;
            play = true;
            let i = 0;
            function run() {
                if (!play) return;
                playPad(i % 16);
                i++;
                setTimeout(run, 250);
            }
            run();
        }
        
        function stopAll() {
            play = false;
        }
        
        function exportWAV() {
            if (!buf) return alert('Load audio first');
            const ctx = new OfflineAudioContext(buf.numberOfChannels, buf.length, buf.sampleRate);
            const src = ctx.createBufferSource();
            src.buffer = buf;
            src.connect(ctx.destination);
            src.start(0);
            ctx.startRendering().then(b => {
                const wav = toWav(b);
                const url = URL.createObjectURL(new Blob([wav], {type: 'audio/wav'}));
                const a = document.createElement('a');
                a.href = url;
                a.download = 'sample.wav';
                a.click();
                URL.revokeObjectURL(url);
            });
        }
        
        function toWav(b) {
            const ch = b.numberOfChannels;
            const sr = b.sampleRate;
            const len = b.length * ch * 2;
            const view = new DataView(new ArrayBuffer(44 + len));
            
            const write = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o+i, s.charCodeAt(i)); };
            write(0, 'RIFF');
            view.setUint32(4, 36+len, 1);
            write(8, 'WAVE');
            write(12, 'fmt ');
            view.setUint32(16, 16, 1);
            view.setUint16(20, 1, 1);
            view.setUint16(22, ch, 1);
            view.setUint32(24, sr, 1);
            view.setUint32(28, sr*ch*2, 1);
            view.setUint16(32, ch*2, 1);
            view.setUint16(34, 16, 1);
            write(36, 'data');
            view.setUint32(40, len, 1);
            
            let off = 44;
            for (let i = 0; i < b.length; i++) {
                for (let c = 0; c < ch; c++) {
                    const s = Math.max(-1, Math.min(1, b.getChannelData(c)[i]));
                    view.setInt16(off, s * 0x7fff, 1);
                    off += 2;
                }
            }
            return view.buffer;
        }
        
        window.addEventListener('load', () => {
            ensureCtx();
            const g = document.getElementById('pads');
            const nums = [13,14,15,16,9,10,11,12,5,6,7,8,1,2,3,4];
            
            for (let i = 0; i < 16; i++) {
                const p = document.createElement('button');
                p.className = 'pad';
                p.textContent = nums[i];
                p.onmousedown = () => { playPad(i); curP = i; };
                p.ontouchstart = (e) => { e.preventDefault(); playPad(i); curP = i; };
                g.appendChild(p);
            }
            
            draw();
        });
    </script>
</body>
</html>
