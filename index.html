<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>OmniGroove Studio - Absolute Replica</title>  
    <script src="https://tailwindcss.com"></script>  
    <style>  
        .mpc-one-frame {  
            background-color: #24272c;  
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 0);  
            background-size: 8px 8px;  
            border: 6px solid #141518;  
        }  
        .mpc-hardware-screen {  
            background: linear-gradient(180deg, #161a22 0%, #0d1017 100%);  
            border: 3px solid #14161a;  
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);  
        }  
        /* Big chunky RGB-lit MPC rubber pads */  
        .mpc-rubber-pad {  
            position: relative;  
            background: linear-gradient(135deg, #4a5058 0%, #23262b 100%);  
            border: 1px solid #0f1114;  
            border-radius: 10px;  
            box-shadow: 0 6px 0 #0a0b0d, inset 0 2px 3px rgba(255,255,255,0.18),  
                        inset 0 0 0 3px rgba(255,102,0,0.10);  
            transition: all 0.05s ease;  
            aspect-ratio: 1 / 1;      /* keeps pads square */  
            min-height: 60px;         /* size floor so they stay big on phones */  
        }  
        .mpc-rubber-pad::after {      /* RGB glow ring */  
            content: "";  
            position: absolute; inset: 4px;  
            border-radius: 8px;  
            box-shadow: inset 0 0 6px rgba(255,102,0,0.25);  
            pointer-events: none;  
        }  
        .mpc-rubber-pad:active {  
            transform: translateY(6px);  
            box-shadow: 0 0 0 #000, 0 0 24px #ff6600;  
            background: #ff6600 !important;  
        }  
        /* Q-Link knobs */  
        .qlink-knob {  
            background: radial-gradient(circle at 50% 35%, #55595f 0%, #1c1e22 70%);  
            border: 2px solid #0d0e10;  
            box-shadow: 0 3px 5px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.2);  
        }  
        .qlink-knob::before {  
            content: ""; position: absolute; top: 4px; left: 50%;  
            width: 2px; height: 8px; background: #ff6600; transform: translateX(-50%);  
            border-radius: 2px;  
        }  
        /* Jog / data wheel */  
        .data-wheel {  
            background: radial-gradient(circle, #3a3d42 0%, #17181b 60%, #0c0d0f 100%);  
            border: 3px solid #0a0b0d;  
            box-shadow: 0 4px 10px rgba(0,0,0,0.7), inset 0 2px 6px rgba(255,255,255,0.12);  
        }  
        /* Transport / mode buttons */  
        .hw-btn {  
            background: linear-gradient(135deg, #33373d 0%, #202327 100%);  
            border: 1px solid #0e0f11;  
            box-shadow: 0 3px 0 #0a0b0d, inset 0 1px 1px rgba(255,255,255,0.1);  
        }  
        .hw-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #000; }  
  
        .vinyl-disc {  
            background: radial-gradient(circle, #333 4%, #111 5%, #111 12%, #222 13%, #111 25%, #222 26%, #111 40%, #000 41%, #111 98%, #444 100%);  
            box-shadow: 0 6px 15px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,255,255,0.1);  
            transition: transform 0.05s linear;  
        }  
        .sp-faceplate-exact { background-color: #1a1a1a; border: 6px solid #0f0f0f; }  
        .sp-orange-circle-lcd {  
            background: radial-gradient(circle, #2b0c00 10%, #080200 80%);  
            border: 6px solid #333;  
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.9), 0 0 10px rgba(255,102,0,0.2);  
            color: #ff5500; text-shadow: 0 0 8px #ff5500;  
        }  
        .viewport-slider {  
            display: flex; overflow-x: auto;  
            scroll-snap-type: x mandatory; scroll-behavior: smooth;  
        }  
        .viewport-slider::-webkit-scrollbar { display: none; }  
        .slide-frame { flex: 0 0 100%; width: 100%; scroll-snap-align: start; }  
    </style>  
</head>  
<body class="bg-black text-zinc-300 font-sans h-screen overflow-hidden select-none">  
  
    <div class="viewport-slider w-full h-full">  
  
        <!-- PAGE 1: AKAI MPC ONE -->  
        <div class="slide-frame h-full p-3 flex flex-col gap-3 mpc-one-frame overflow-y-auto">  
  
            <!-- COLOR TOUCHSCREEN (compact, ~30% instead of 45%) -->  
            <div class="w-full mpc-hardware-screen rounded-lg p-2.5 flex flex-col gap-2 relative shrink-0" style="height:30%">  
                <div class="flex justify-between items-center text-[10px] font-bold border-b border-zinc-800 pb-1">  
                    <span class="text-orange-500 font-black tracking-widest">AKAI MPC ONE • MAIN</span>  
                    <span class="animate-pulse text-zinc-400">SP-404 ➡️</span>  
                </div>  
                <div class="flex-1 my-1 flex gap-2 overflow-hidden">  
                    <div id="playlistContainer" class="flex-1 bg-black/80 rounded-md border border-zinc-950 p-2 overflow-y-auto text-xs font-mono">  
                        <div id="emptyMsg" class="text-zinc-600 text-center uppercase tracking-widest text-[9px] pt-6">  
                            [ PLAYLIST EMPTY - IMPORT VINYL SAMPLE ]  
                        </div>  
                    </div>  
                    <div class="w-5 bg-zinc-950 rounded-md border border-zinc-900 p-0.5 flex flex-col justify-between items-center gap-0.5">  
                        <div id="vu-peak" class="w-full h-2 bg-red-900 rounded-sm transition-colors duration-75"></div>  
                        <div id="vu-high" class="w-full flex-1 bg-orange-950 rounded-sm transition-colors duration-75"></div>  
                        <div id="vu-mid" class="w-full flex-1 bg-green-950 rounded-sm transition-colors duration-75"></div>  
                        <div id="vu-low" class="w-full flex-1 bg-green-950 rounded-sm transition-colors duration-75"></div>  
                        <span class="text-[7px] text-zinc-600 font-black">VU</span>  
                    </div>  
                </div>  
                <div class="flex justify-between items-center pt-1 border-t border-zinc-800/80">  
                    <label class="hw-btn text-zinc-200 px-3 py-1.5 rounded text-[10px] font-black cursor-pointer uppercase tracking-wider">  
                        GET FROM RECORD  
                        <input type="file" id="audioFile" accept="audio/*" class="hidden" onchange="handleVinylUpload(event)">  
                    </label>  
                    <button onclick="executeChop()" class="bg-orange-600 hover:bg-orange-500 px-4 py-1.5 rounded text-[10px] font-black text-white uppercase tracking-widest">CHOP TO 16</button>  
                </div>  
            </div>  
  
            <!-- CONTROL STRIP: Q-LINK KNOBS + DATA WHEEL + TRANSPORT -->  
            <div class="w-full flex items-center justify-between gap-2 shrink-0">  
                <!-- Q-Link knobs -->  
                <div class="grid grid-cols-2 gap-2">  
                    <div class="qlink-knob w-8 h-8 rounded-full relative"></div>  
                    <div class="qlink-knob w-8 h-8 rounded-full relative"></div>  
                    <div class="qlink-knob w-8 h-8 rounded-full relative"></div>  
                    <div class="qlink-knob w-8 h-8 rounded-full relative"></div>  
                </div>  
                <!-- Transport buttons -->  
                <div class="flex-1 grid grid-cols-3 gap-1.5">  
                    <button class="hw-btn rounded py-2 text-[8px] font-black text-zinc-400 uppercase">Rec</button>  
                    <button class="hw-btn rounded py-2 text-[8px] font-black text-zinc-400 uppercase">Overdub</button>  
                    <button class="hw-btn rounded py-2 text-[8px] font-black text-zinc-400 uppercase">Stop</button>  
                    <button class="hw-btn rounded py-2 text-[8px] font-black text-green-500 uppercase">Play</button>  
                    <button class="hw-btn rounded py-2 text-[8px] font-black text-green-500 uppercase">Play St</button>  
                    <button class="hw-btn rounded py-2 text-[8px] font-black text-zinc-400 uppercase">Tap</button>  
                </div>  
                <!-- Data wheel -->  
                <div class="data-wheel w-14 h-14 rounded-full flex items-center justify-center">  
                    <span class="text-[7px] text-zinc-500 font-black">DATA</span>  
                </div>  
            </div>  
  
            <!-- BANK / MODE ROW -->  
            <div class="w-full grid grid-cols-8 gap-1 shrink-0">  
                <button class="hw-btn rounded py-1 text-[8px] font-black text-orange-500">A</button>  
                <button class="hw-btn rounded py-1 text-[8px] font-black text-zinc-400">B</button>  
                <button class="hw-btn rounded py-1 text-[8px] font-black text-zinc-400">C</button>  
                <button class="hw-btn rounded py-1 text-[8px] font-black text-zinc-400">D</button>  
                <button class="hw-btn rounded py-1 text-[8px] font-black text-zinc-400">Main</button>  
                <button class="hw-btn rounded py-1 text-[8px] font-black text-zinc-400">Brws</button>  
                <button class="hw-btn rounded py-1 text-[8px] font-black text-zinc-400">Smpl</button>  
                <button class="hw-btn rounded py-1 text-[8px] font-black text-zinc-400">Menu</button>  
            </div>  
  
            <!-- 4x4 BIG PAD MATRIX (grows to fill remaining space) -->  
            <div class="w-full flex-1 bg-zinc-950/40 p-2 rounded-xl border border-zinc-900 shadow-inner">  
                <div class="grid grid-cols-4 gap-2.5 h-full">  
                    <script>  
                        for (let i = 16; i >= 1; i--) {  
                            document.write(`  
                                <button onmousedown="hitPad(${i-1})" ontouchstart="hitPad(${i-1})"  
                                    class="mpc-rubber-pad flex flex-col justify-between p-2 text-left">  
                                    <span class="text-[8px] font-bold text-zinc-500 tracking-tighter">A${i.toString().padStart(2,'0')}</span>  
                                    <span class="text-[10px] font-black text-zinc-300 self-end">PAD ${i}</span>  
                                </button>  
                            `);  
                        }  
                    </script>  
                </div>  
            </div>  
        </div>  
  
        <!-- PAGE 2: SP-404MKII + HANDYTRAX (unchanged) -->  
        <div class="slide-frame h-full p-4 flex flex-col justify-between sp-faceplate-exact border-l-[6px] border-black">  
            <div class="w-full bg-zinc-950 rounded-xl border-2 border-zinc-900 p-3 flex flex-col gap-2 shadow-2xl">  
                <div class="flex justify-between items-center text-[9px] font-black text-zinc-500 uppercase tracking-widest">  
                    <span>⬅️ SWIPE LEFT FOR MPC ONE</span>  
                    <span class="text-orange-500 font-bold">HANDYTRAX DECK REPLICA</span>  
                </div>  
                <div class="w-full flex justify-center py-2 bg-black rounded-lg border border-zinc-900 relative">  
                    <div id="vinylDisc" class="w-36 h-36 rounded-full vinyl-disc relative flex items-center justify-center cursor-pointer">  
                        <div class="w-12 h-12 rounded-full bg-orange-500 border-4 border-zinc-900 flex items-center justify-center text-center">  
                            <div class="w-2 h-2 rounded-full bg-black"></div>  
                        </div>  
                    </div>  
                </div>  
                <div class="text-center text-[9px] text-zinc-600 font-bold uppercase tracking-widest">Touch & spin vinyl circle with thumb to scratch sample</div>  
            </div>  
            <div class="w-full flex justify-center my-2">  
                <div class="w-28 h-28 rounded-full sp-orange-circle-lcd flex flex-col items-center justify-center font-mono select-none">  
                    <span id="spValue" class="text-2xl font-black tracking-tighter">READY</span>  
                    <span class="text-[8px] tracking-widest uppercase font-bold text-orange-600 mt-1"> Roland SP-404 </span>  
                </div>  
            </div>  
            <div class="w-full bg-zinc-950/80 rounded-xl border border-zinc-900 p-3 flex flex-col gap-2.5 shadow-inner">  
                <button id="vinylSimBtn" onclick="toggleVinylSim()" class="w-full bg-zinc-800 border border-zinc-700 py-3.5 rounded-lg text-xs font-black tracking-widest text-zinc-400 active:scale-95 transition-all shadow">  
                    VINYL SIMULATOR EFFECT  
                </button>  
                <button id="compBtn" onclick="toggleCompressor()" class="w-full bg-zinc-800 border border-zinc-700 py-3.5 rounded-lg text-xs font-black tracking-widest text-zinc-400 active:scale-95 transition-all shadow">  
                    303 PUMPING COMPRESSOR  
                </button>  
            </div>  
        </div>  
  
    </div>  
  
    <!-- SOUND PROCESSING AUDIO LOGIC -->
