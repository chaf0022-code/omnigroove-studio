<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniGroove Studio - Absolute Replica</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        /* Exact MPC One Color Palette & Layout Controls */
        .mpc-one-frame {
            background-color: #24272c; /* Exact AKAI MPC Industrial Slate Gray */
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 8px 8px;
            border: 6px solid #141518;
        }
        .mpc-hardware-screen {
            background: linear-gradient(180deg, #161a22 0%, #0d1017 100%);
            border: 3px solid #14161a;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }
        /* Thick Chunky MPC Rubber Style Pads */
        .mpc-rubber-pad {
            background: linear-gradient(135deg, #444a54 0%, #292d33 100%);
            border: 1px solid #121417;
            box-shadow: 0 5px 0 #0d0e10, inset 0 2px 3px rgba(255,255,255,0.15);
            transition: all 0.04s ease;
        }
        .mpc-rubber-pad:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #000, 0 0 20px #ff6600;
            background: #ff6600 !important;
        }

        /* Spinning Vinyl Record Engine Style (HandyTrax) */
        .vinyl-disc {
            background: radial-gradient(circle, #333 4%, #111 5%, #111 12%, #222 13%, #111 25%, #222 26%, #111 40%, #000 41%, #111 98%, #444 100%);
            box-shadow: 0 6px 15px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,255,255,0.1);
            transition: transform 0.05s linear;
        }

        /* SP-404MKII Exact Hardware Form-Factor */
        .sp-faceplate-exact {
            background-color: #1a1a1a;
            border: 6px solid #0f0f0f;
        }
        .sp-orange-circle-lcd {
            background: radial-gradient(circle, #2b0c00 10%, #080200 80%);
            border: 6px solid #333;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.9), 0 0 10px rgba(255,102,0,0.2);
            color: #ff5500;
            text-shadow: 0 0 8px #ff5500;
        }

        /* Mobile Swipe Grid Layer */
        .viewport-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }
        .viewport-slider::-webkit-scrollbar { display: none; }
        .slide-frame { flex: 0 0 100%; width: 100%; scroll-snap-align: start; }
    </style>
</head>
<body class="bg-black text-zinc-300 font-sans h-screen overflow-hidden select-none">

    <!-- MAIN DEVICE SLIDER -->
    <div class="viewport-slider w-full h-full">

        <!-- PAGE 1: REPLICA AKAI MPC ONE HARDWARE INTERFACE -->
        <div class="slide-frame h-full p-4 flex flex-col justify-between mpc-one-frame">
            
            <!-- MPC One Top Half (Screen Dashboard) -->
            <div class="w-full h-[45%] mpc-hardware-screen rounded-lg p-3 flex flex-col justify-between relative">
                
                <div class="flex justify-between items-center text-[10px] text-zinc-500 font-bold border-b border-zinc-800 pb-1">
                    <span class="text-orange-500 font-black tracking-widest">AKAI MPC ONE MAIN DISPLAY</span>
                    <span class="animate-pulse text-zinc-400">SWIPE RIGHT FOR SP-404 ➡️</span>
                </div>

                <!-- PLAYLIST CONTAINER & SAMPLING SOUND LEVEL METERS -->
                <div class="flex-1 my-2 flex gap-3 overflow-hidden">
                    
                    <!-- Left: Playlist Loop Manager -->
                    <div id="playlistContainer" class="flex-1 bg-black/80 rounded-md border border-zinc-950 p-2 overflow-y-auto text-xs font-mono">
                        <div id="emptyMsg" class="text-zinc-600 text-center uppercase tracking-widest text-[9px] pt-8">
                            [ PLAYLIST EMPTY - IMPORT VINYL SAMPLE ]
                        </div>
                    </div>

                    <!-- Right: AUDIO SAMPLING LEVEL BAR (VU METER) -->
                    <div class="w-6 bg-zinc-950 rounded-md border border-zinc-900 p-0.5 flex flex-col justify-between items-center gap-0.5">
                        <div id="vu-peak" class="w-full h-2 bg-red-900 rounded-sm transition-colors duration-75"></div>
                        <div id="vu-high" class="w-full flex-1 bg-orange-950 rounded-sm transition-colors duration-75"></div>
                        <div id="vu-mid" class="w-full flex-1 bg-green-950 rounded-sm transition-colors duration-75"></div>
                        <div id="vu-low" class="w-full flex-1 bg-green-950 rounded-sm transition-colors duration-75"></div>
                        <span class="text-[7px] text-zinc-600 font-black mt-0.5">VU</span>
                    </div>

                </div>

                <!-- Hardware Utility Command Buttons -->
                <div class="flex justify-between items-center pt-1 border-t border-zinc-800/80">
                    <label class="bg-zinc-800 hover:bg-zinc-700 text-zinc-200 px-4 py-1.5 rounded text-[10px] font-black border border-zinc-700 cursor-pointer uppercase shadow tracking-wider">
                        GET FROM RECORD
                        <input type="file" id="audioFile" accept="audio/*" class="hidden" onchange="handleVinylUpload(event)">
                    </label>
                    <button onclick="executeChop()" class="bg-orange-600 hover:bg-orange-500 px-5 py-1.5 rounded text-[10px] font-black text-white uppercase shadow tracking-widest">CHOP TO 16</button>
                </div>
            </div>

            <!-- MPC One Bottom Half: 4x4 Thick Pad Controller Matrix -->
            <div class="h-[52%] w-full bg-zinc-950/40 p-2 rounded-xl border border-zinc-900 shadow-inner flex flex-col justify-between">
                <div class="grid grid-cols-4 grid-rows-4 gap-3 h-full">
                    <script>
                        for(let i = 16; i >= 1; i--) {
                            document.write(`
                                <button onmousedown="hitPad(${i-1})" class="mpc-rubber-pad rounded-lg flex flex-col justify-between p-2 text-left">
                                    <span class="text-[8px] font-bold text-zinc-600 tracking-tighter">A${i.toString().padStart(2,'0')}</span>
                                    <span class="text-[10px] font-black text-zinc-400 self-end">PAD ${i}</span>
                                </button>
                            `);
                        }
                    </script>
                </div>
            </div>

        </div>

        <!-- PAGE 2: REPLICA ROLAND SP-404MKII + HANDYTRAX VINYL SCRATCH DECK -->
        <div class="slide-frame h-full p-4 flex flex-col justify-between sp-faceplate-exact border-l-[6px] border-black">
            
            <!-- TOP HALF: THE HANDYTRAX PORTABLE VINYL WORK BENCH -->
            <div class="w-full bg-zinc-950 rounded-xl border-2 border-zinc-900 p-3 flex flex-col gap-2 shadow-2xl">
                <div class="flex justify-between items-center text-[9px] font-black text-zinc-500 uppercase tracking-widest">
                    <span>⬅️ SWIPE LEFT FOR MPC ONE</span>
                    <span class="text-orange-500 font-bold">HANDYTRAX DECK REPLICA</span>
                </div>

                <!-- PHYSICAL SPINNING VINYL RECORD CANVAS -->
                <div class="w-full flex justify-center py-2 bg-black rounded-lg border border-zinc-900 relative">
                    <div id="vinylDisc" class="w-36 h-36 rounded-full vinyl-disc relative flex items-center justify-center cursor-pointer">
                        <!-- Record Center Center Ring Label -->
                        <div class="w-12 h-12 rounded-full bg-orange-500 border-4 border-zinc-900 flex items-center justify-center text-center">
                            <div class="w-2 h-2 rounded-full bg-black"></div>
                        </div>
                    </div>
                </div>
                <div class="text-center text-[9px] text-zinc-600 font-bold uppercase tracking-widest">Touch & spin vinyl circle with thumb to scratch sample</div>
            </div>

            <!-- MIDDLE SECTION: THE ICONIC CIRCULAR SP-404 DISPLAY -->
            <div class="w-full flex justify-center my-2">
                <div class="w-28 h-28 rounded-full sp-orange-circle-lcd flex flex-col items-center justify-center font-mono select-none">
                    <span id="spValue" class="text-2xl font-black tracking-tighter">READY</span>
                    <span class="text-[8px] tracking-widest uppercase font-bold text-orange-600 mt-1"> Roland SP-404 </span>
                </div>
            </div>

            <!-- BOTTOM HALF: ROLAND MFX STUDIO LAUNCHER CONSOLE -->
            <div class="w-full bg-zinc-950/80 rounded-xl border border-zinc-900 p-3 flex flex-col gap-2.5 shadow-inner">
                <button id="vinylSimBtn" onclick="toggleVinylSim()" class="w-full bg-zinc-800 border border-zinc-700 py-3.5 rounded-lg text-xs font-black tracking-widest text-zinc-400 active:scale-95 transition-all shadow">
                    VINYL SIMULATOR EFFECT
                </button>
                <button id="compBtn" onclick="toggleCompressor()" class="w-full bg-zinc-800 border border-zinc-700 py-3.5 rounded-lg text-xs font-black tracking-widest text-zinc-400 active:scale-95 transition-all shadow">
                    303 PUMPING COMPRESSOR
                </button>
            </div>

        </div>

    </div>

    <!-- SOUND PROCESSING AUDIO LOGIC -->
    <script>
        let audioCtx = null, vinylBuffer = null, padsArray = new Array(16).fill(null);
        let mainVolume = null, compressorNode = null, crackleNode = null;
        let compActive = false, vinylSimActive = false;

        // Vinyl Scratch State Variables
