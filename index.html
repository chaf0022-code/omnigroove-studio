<!-- index.html -->  
<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
<title>OmniGroove Studio</title>  
<script src="https://tailwindcss.com"></script>  
<style>  
    .mpc-one-frame{background-color:#24272c;background-image:radial-gradient(rgba(255,255,255,0.03) 1px,transparent 0);background-size:8px 8px;border:6px solid #141518;}  
    .mpc-hardware-screen{background:linear-gradient(180deg,#161a22 0%,#0d1017 100%);border:3px solid #14161a;box-shadow:inset 0 2px 8px rgba(0,0,0,0.8);}  
    .mpc-rubber-pad{  
        background:linear-gradient(135deg,rgba(90,98,110,0.9) 0%,rgba(41,45,51,0.95) 100%);  
        border:1px solid #121417;  
        box-shadow:0 6px 0 #0d0e10, inset 0 2px 4px rgba(255,255,255,0.18), inset 0 -3px 6px rgba(0,0,0,0.5);  
        transition:transform .05s ease, box-shadow .05s ease, background .05s ease;  
    }  
    .mpc-rubber-pad.pad-hit{  
        transform:translateY(6px);  
        box-shadow:0 0 0 #000, 0 0 22px #ff6600, inset 0 2px 6px rgba(0,0,0,0.6);  
        background:linear-gradient(135deg,#ff8a33,#ff6600);  
    }  
    .vinyl-disc{box-shadow:0 6px 15px rgba(0,0,0,0.7),inset 0 0 10px rgba(255,255,255,0.1);will-change:transform;touch-action:none;}  
    .sp-faceplate-exact{background-color:#1a1a1a;border:6px solid #0f0f0f;}  
    .sp-orange-circle-lcd{background:radial-gradient(circle,#2b0c00 10%,#080200 80%);border:6px solid #333;box-shadow:inset 0 4px 12px rgba(0,0,0,0.9),0 0 10px rgba(255,102,0,0.2);color:#ff5500;text-shadow:0 0 8px #ff5500;}  
    .viewport-slider{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;}  
    .viewport-slider::-webkit-scrollbar{display:none;}  
    .slide-frame{flex:0 0 100%;width:100%;scroll-snap-align:start;}  
</style>  
</head>  
<body class="bg-black text-zinc-300 font-sans h-screen overflow-hidden select-none">  
<div class="viewport-slider w-full h-full">  
  
    <!-- PAGE 1: MPC ONE -->  
    <div class="slide-frame h-full p-4 flex flex-col justify-between mpc-one-frame">  
        <div class="w-full h-[45%] mpc-hardware-screen rounded-lg p-3 flex flex-col justify-between relative">  
            <div class="flex justify-between items-center text-[10px] text-zinc-500 font-bold border-b border-zinc-800 pb-1">  
                <span class="text-orange-500 font-black tracking-widest">AKAI MPC ONE MAIN DISPLAY</span>  
                <span class="animate-pulse text-zinc-400">SWIPE RIGHT FOR SP-404 &#10142;</span>  
            </div>  
            <div class="flex-1 my-2 flex gap-3 overflow-hidden">  
                <div id="playlistContainer" class="flex-1 bg-black/80 rounded-md border border-zinc-950 p-2 overflow-y-auto text-xs font-mono">  
                    <div id="emptyMsg" class="text-zinc-600 text-center uppercase tracking-widest text-[9px] pt-8">[ PLAYLIST EMPTY - IMPORT VINYL SAMPLE ]</div>  
                </div>  
                <div id="vuMeter" class="w-6 bg-zinc-950 rounded-md border border-zinc-900 p-0.5 flex flex-col-reverse justify-start items-center gap-0.5"></div>  
            </div>  
            <div class="flex justify-between items-center pt-1 border-t border-zinc-800/80">  
                <label class="bg-zinc-800 hover:bg-zinc-700 text-zinc-200 px-4 py-1.5 rounded text-[10px] font-black border border-zinc-700 cursor-pointer uppercase shadow tracking-wider">  
                    GET FROM RECORD  
                    <input type="file" id="audioFile" accept="audio/*" class="hidden" onchange="handleVinylUpload(event)">  
                </label>  
                <button onclick="executeChop()" class="bg-orange-600 hover:bg-orange-500 px-5 py-1.5 rounded text-[10px] font-black text-white uppercase shadow tracking-widest">CHOP TO 16</button>  
            </div>  
        </div>  
        <div class="h-[52%] w-full bg-zinc-950/40 p-2 rounded-xl border border-zinc-900 shadow-inner flex flex-col justify-between">  
            <div id="padGrid" class="grid grid-cols-4 grid-rows-4 gap-3 h-full"></div>  
        </div>  
    </div>  
  
    <!-- PAGE 2: SP-404MKII + HANDYTRAX -->  
    <div class="slide-frame h-full p-4 flex flex-col justify-between sp-faceplate-exact border-l-[6px] border-black">  
        <div class="w-full bg-zinc-950 rounded-xl border-2 border-zinc-900 p-3 flex flex-col gap-2 shadow-2xl">  
            <div class="flex justify-between items-center text-[9px] font-black text-zinc-500 uppercase tracking-widest">  
                <span>&#11013;&#65039; SWIPE LEFT FOR MPC ONE</span>  
                <span class="text-orange-500 font-bold">HANDYTRAX DECK REPLICA</span>  
            </div>  
            <div class="w-full flex justify-center py-2 bg-black rounded-lg border border-zinc-900 relative">  
                <canvas id="vinylCanvas" width="288" height="288" class="w-36 h-36 rounded-full vinyl-disc cursor-pointer"></canvas>  
            </div>  
            <div class="text-center text-[9px] text-zinc-600 font-bold uppercase tracking-widest">Touch & spin vinyl to scratch sample</div>  
        </div>  
        <div class="w-full flex justify-center my-2">  
            <div class="w-28 h-28 rounded-full sp-orange-circle-lcd flex flex-col items-center justify-center font-mono">  
                <span id="spValue" class="text-2xl font-black tracking-tighter">READY</span>  
                <span class="text-[8px] tracking-widest uppercase font-bold text-orange-600 mt-1">Roland SP-404</span>  
            </div>  
        </div>  
        <div class="w-full bg-zinc-950/80 rounded-xl border border-zinc-900 p-3 flex flex-col gap-2.5 shadow-inner">  
            <button id="vinylSimBtn" onclick="toggleVinylSim()" class="w-full bg-zinc-800 border border-zinc-700 py-3.5 rounded-lg text-xs font-black tracking-widest text-zinc-400 active:scale-95 transition-all shadow">VINYL SIMULATOR EFFECT</button>  
            <button id="compBtn" onclick="toggleCompressor()" class="w-full bg-zinc-800 border border-zinc-700 py-3.5 rounded-lg text-xs font-black tracking-widest text-zinc-400 active:scale-95 transition-all shadow">303 PUMPING COMPRESSOR</button>  
        </div>  
    </div>  
</div>  
  
<script>  
/* ---------- AUDIO CORE ---------- */  
let audioCtx=null, vinylBuffer=null, analyser=null, mainVolume=null, compressorNode=null;  
let padSlices=new Array(16).fill(null);  
let tracklist=[];  
let compActive=false, vinylSimActive=false;  
let scratchSource=null;  
  
function initAudio(){  
    if(audioCtx) return;  
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();  
    mainVolume=audioCtx.createGain();  
    compressorNode=audioCtx.createDynamicsCompressor();  
    analyser=audioCtx.createAnalyser();  
    analyser.fftSize=1024;  
    mainVolume.connect(analyser);  
    analyser.connect(audioCtx.destination);  
    runVU();  
}  
  
/* ---------- 1. PADS ---------- */  
const padGrid=document.getElementById('padGrid');  
for(let i=16;i>=1;i--){  
    const b=document.createElement('button');  
    b.className='mpc-rubber-pad rounded-lg flex flex-col justify-between p-2 text-left';  
    b.innerHTML=`<span class="text-[8px] font-bold text-zinc-600 tracking-tighter">A${i.toString().padStart(2,'0')}</span>  
                 <span class="text-[10px] font-black text-zinc-400 self-end">PAD ${i}</span>`;  
    const idx=i-1;  
    const press=e=>{e.preventDefault();hitPad(idx);};  
    b.addEventListener('mousedown',press);  
    b.addEventListener('touchstart',press,{passive:false});  
    padGrid.appendChild(b);  
}  
function hitPad(idx){  
    initAudio();  
    const pad=padGrid.children[15-idx];  
    if(pad){pad.classList.add('pad-hit');setTimeout(()=>pad.classList.remove('pad-hit'),120);}  
    const slice=padSlices[idx];  
    if(!vinylBuffer||!slice) return;  
    const src=audioCtx.createBufferSource();  
    src.buffer=vinylBuffer;  
    if(compActive){src.connect(compressorNode);compressorNode.connect(mainVolume);}  
    else src.connect(mainVolume);  
    src.start(0,slice.offset,slice.duration);  
}  
  
/* ---------- 4. PLAYLIST / UPLOAD ---------- */  
async function handleVinylUpload(e){  
    const file=e.target.files[0]; if(!file) return;  
    initAudio();  
    const arr=await file.arrayBuffer();  
    vinylBuffer=await audioCtx.decodeAudioData(arr);  
    tracklist.push({name:file.name});  
    renderPlaylist();  
    scratchSource=null; // rebuild turntable source with new buffer  
}  
function renderPlaylist(){  
    const c=document.getElementById('playlistContainer');  
    const empty=document.getElementById('emptyMsg');  
    if(tracklist.length===0){empty.style.display='block';return;}  
    empty.style.display='none';  
    c.querySelectorAll('.track-row').forEach(n=>n.remove());  
    tracklist.forEach((t,i)=>{  
        const row=document.createElement('div');  
        row.className='track-row text-orange-400 truncate py-0.5 border-b border-zinc-900';  
        row.textContent=`${(i+1).toString().padStart(2,'0')}  ${t.name}`;  
        c.appendChild(row);  
    });  
}  
  
/* ---------- CHOP ---------- */  
function executeChop(){  
    if(!vinylBuffer) return;  
    const slice=vinylBuffer.duration/16;  
    for(let i=0;i<16;i++) padSlices[i]={offset:i*slice,duration:slice};  
    setSp('CHOP');  
}  
  
/* ---------- 3. VU METER ---------- */  
const vu=document.getElementById('vuMeter');  
const LED_COUNT=12, leds=[];  
for(let i=0;i<LED_COUNT;i++){  
    const d=document.createElement('div');  
    d.className='w-full flex-1 rounded-sm transition-colors duration-75 bg-zinc-900';  
    vu.appendChild(d); leds.push(d);  
}  
function runVU(){  
    const buf=new Float32Array(analyser.fftSize);  
    (function loop(){  
        requestAnimationFrame(loop);  
        analyser.getFloatTimeDomainData(buf);  
        let sum=0; for(let i=0;i<buf.length;i++) sum+=buf[i]*buf[i];  
        const rms=Math.sqrt(sum/buf.length);  
        const db=20*Math.log10(rms||1e-8);  
        const level=Math.max(0,Math.min(1,(db+60)/60));  
        const lit=Math.round(level*LED_COUNT);  
        leds.forEach((led,i)=>{  
            if(i<lit) led.className='w-full flex-1 rounded-sm '+(i>LED_COUNT-3?'bg-red-500':i>LED_COUNT-6?'bg-orange-500':'bg-green-500');  
            else led.className='w-full flex-1 rounded-sm bg-zinc-900';  
        });  
    })();  
}  
  
/* ---------- 2. TURNTABLE ---------- */  
const canvas=document.getElementById('vinylCanvas');  
const ctx=canvas.getContext('2d');  
let angle=0, velocity=0, dragging=false, lastAngle=0, lastTime=0;  
const FRICTION=0.95, BASE_SPIN=0.03;  
  
function drawVinyl(){  
    const s=canvas.width, c=s/2;  
    ctx.clearRect(0,0,s,s);  
    ctx.save(); ctx.translate(c,c); ctx.rotate(angle);  
    const g=ctx.createRadialGradient(0,0,10,0,0,c);  
    g.addColorStop(0,'#333');g.addColorStop(0.5,'#111');g.addColorStop(1,'#000');  
    ctx.fillStyle=g; ctx.beginPath();ctx.arc(0,0,c,0,7);ctx.fill();  
    ctx.strokeStyle='rgba(255,255,255,0.05)';  
    for(let r=20;r<c;r+=4){ctx.beginPath();ctx.arc(0,0,r,0,7);ctx.stroke();}  
    ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(0,0,40,0,7);ctx.fill();  
    ctx.fillStyle='#000';ctx.fillRect(-2,-40,4,20);  
    ctx.beginPath();ctx.arc(0,0,6,0,7);ctx.fill();  
    ctx.restore();  
    const gloss=ctx.createLinearGradient(0,0,0,s);  
    gloss.addColorStop(0,'rgba(255,255,255,0.12)');gloss.addColorStop(0.5,'rgba(255,255,255,0)');  
    ctx.fillStyle=gloss;ctx.beginPath();ctx.arc(c,c,c,0,7);ctx.fill();  
}  
function physics(){  
    if(!dragging){  
        velocity=velocity*FRICTION + (vinylSimActive?0:BASE_SPIN)*(1-FRICTION);  
        angle+=velocity;  
    }  
    updatePlaybackRate(velocity);  
    drawVinyl();  
    requestAnimationFrame(physics);  
}  
function updatePlaybackRate(v){  
    if(scratchSource){  
        const rate=v/BASE_SPIN;  
        scratchSource.playbackRate.value=Math.max(0.0001,Math.min(4,Math.abs(rate)));  
    }  
}  
function pointerAngle(e){  
    const r=canvas.getBoundingClientRect();  
    const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left-r.width/2;  
    const y=(e.touches?e.touches[0].clientY:e.clientY)-r.top-r.height/2;  
    return Math.atan2(y,x);  
}  
function startScratch(e){e.preventDefault();initAudio();ensureScratchSource();dragging=true;lastAngle=pointerAngle(e);lastTime=performance.now();}  
function moveScratch(e){  
    if(!dragging) return;e.preventDefault();  
    const a=pointerAngle(e), now=performance.now();  
    let d=a-lastAngle;  
    if(d>Math.PI) d-=2*Math.PI; if(d<-Math.PI) d+=2*Math.PI;  
    angle+=d;  
    velocity=d/((now-lastTime)/16.6);  
    lastAngle=a;lastTime=now;  
}  
function endScratch(){dragging=false;}  
canvas.addEventListener('mousedown',startScratch);  
window.addEventListener('mousemove',moveScratch);  
window.addEventListener('mouseup',endScratch);  
canvas.addEventListener('touchstart',startScratch,{passive:false});  
canvas.addEventListener('touchmove',moveScratch,{passive:false});  
canvas.addEventListener('touchend',endScratch);  
  
function ensureScratchSource(){  
    if(scratchSource||!vinylBuffer) return;  
    scratchSource=audioCtx.createBufferSource();  
    scratchSource.buffer=vinylBuffer;scratchSource.loop=true;  
    scratchSource.connect(mainVolume);  
    scratchSource.start();  
}  
physics();  
  
/* ---------- SP-404 EFFECTS ---------- */  
function setSp(t){document.getElementById('spValue').textContent=t;setTimeout(()=>document.getElementById('spValue').textContent='READY',700);}  
function toggleVinylSim(){vinylSimActive=!vinylSimActive;document.getElementById('vinylSimBtn').classList.toggle('bg-orange-600',vinylSimActive);}  
function toggleCompressor(){compActive=!compActive;document.getElementById('compBtn').classList.toggle('bg-orange-600',compActive);}  
</script>  
</body>  
</html>
